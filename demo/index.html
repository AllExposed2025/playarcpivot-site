<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcPivot Rush Duel</title>
  <link rel="stylesheet" href="/demo/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>
<body>
  <div id="game-shell">
    <div id="game-title">ARCPIVOT RUSH DUEL</div>

    <div id="ai-controls" aria-label="AI difficulty controls">
      <div class="ai-controls-label">AI Opponent</div>

      <div class="ai-controls-buttons">
        <button class="ai-button" data-ai-level="easy" type="button">Easy</button>
        <button class="ai-button is-active" data-ai-level="medium" type="button">Medium</button>
        <button class="ai-button" data-ai-level="hard" type="button">Hard</button>
      </div>

      <div id="ai-status">AI: MEDIUM</div>
    </div>

    <div id="game-container"></div>
  </div>

  <script src="/demo/game.js"></script>
</body>
</html>
