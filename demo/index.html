<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcPivot Rush Duel</title>

  <link rel="stylesheet" href="/demo/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>
<body>
  <div id="game-shell">
    <div id="game-title">ARCPIVOT RUSH DUEL</div>

    <div id="arcade-controls" aria-label="Arcade controls">
      <div class="control-group">
        <div class="control-label">Arcade Side</div>

        <div class="control-buttons">
          <button class="side-button is-active" data-player-side="left" type="button">Play Left</button>
          <button class="side-button" data-player-side="right" type="button">Play Right</button>
        </div>

        <div class="control-status" id="side-status">Player: LEFT // AI: RIGHT</div>
      </div>

      <div class="control-group">
        <div class="control-label">AI Opponent</div>

        <div class="control-buttons">
          <button class="ai-button" data-ai-level="easy" type="button">Easy</button>
          <button class="ai-button is-active" data-ai-level="medium" type="button">Medium</button>
          <button class="ai-button" data-ai-level="hard" type="button">Hard</button>
        </div>

        <div class="control-status" id="ai-status">AI: MEDIUM</div>
      </div>

      <div class="control-group">
        <div class="control-label">Touch Hand</div>

        <div class="control-buttons">
          <button class="hand-button" data-touch-hand="left" type="button">Left-handed</button>
          <button class="hand-button is-active" data-touch-hand="right" type="button">Right-handed</button>
        </div>

        <div class="control-status" id="touch-status">Touch: RIGHT-HANDED</div>
      </div>
    </div>

    <div id="game-stage">
      <div id="game-container"></div>

      <div id="rotate-overlay" aria-hidden="true">
        <div class="rotate-box">
          <div class="rotate-title">Rotate Device</div>
          <div class="rotate-copy">Use landscape mode for Arcade touch controls.</div>
        </div>
      </div>

      <div id="touch-overlay" aria-hidden="true">
        <div id="touch-pad" class="right-handed">
          <div id="touch-pad-ring"></div>
          <div id="touch-pad-thumb"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/demo/game.js"></script>
</body>
</html>
